<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor de Etiquetas — Mimos e Presentes</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   RESET & TOKENS
═══════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:        #F2EDE7;
  --bg-panel:  #FDFBF8;
  --bg-card:   #FFFFFF;
  --bg-input:  #F7F4F0;
  --border:    rgba(30,20,10,0.10);
  --border-md: rgba(30,20,10,0.15);
  --border-focus: #1AA8A8;
  --teal:    #1AA8A8;
  --teal-lt: rgba(26,168,168,0.10);
  --orange:  #F5821F;
  --magenta: #C8315E;
  --gold:    #D4891A;
  --text:        #1C1612;
  --text-sub:    #5A5048;
  --text-muted:  #9A8E84;
  --shadow-xs: 0 1px 3px rgba(30,20,10,0.08);
  --shadow-sm: 0 2px 8px rgba(30,20,10,0.09);
  --shadow-md: 0 4px 18px rgba(30,20,10,0.10);
  --shadow-tag:0 6px 24px rgba(30,20,10,0.15),0 1px 4px rgba(30,20,10,0.08);
  --tag-w: 8cm;
  --tag-h: 3.5cm;
  --dark:  #0E0E0E;
}

html,body{
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}

/* ═══════════════════════════════════════
   HEADER
═══════════════════════════════════════ */
.app-header{
  position:sticky;top:0;z-index:200;
  background:rgba(253,251,248,0.97);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);
  box-shadow:var(--shadow-xs);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;
  height:68px;
}
.hd-brand{
  display:flex;align-items:center;
  gap:20px;               /* espaço entre logo e divider */
}
.hd-logo{
  height:44px;width:auto;
  display:block;
  /* a logo tem fundo creme — sem tratamento extra */
}
.hd-divider{
  width:1px;height:32px;
  background:var(--border-md);
  flex-shrink:0;
}
.hd-subtitle{
  font-family:'DM Mono',monospace;
  font-size:10.5px;font-weight:600;
  letter-spacing:0.13em;text-transform:uppercase;
  color:var(--text-muted);
  white-space:nowrap;
}
.hd-badge{
  font-size:10px;font-weight:600;letter-spacing:0.06em;
  color:var(--teal);background:var(--teal-lt);
  border:1px solid rgba(26,168,168,0.25);border-radius:20px;
  padding:4px 12px;text-transform:uppercase;
  font-family:'DM Mono',monospace;
}

/* ═══════════════════════════════════════
   LAYOUT  (editor | preview)
═══════════════════════════════════════ */
.app-layout{
  display:grid;
  grid-template-columns:390px 1fr;
  min-height:calc(100vh - 68px);
}

/* ─── EDITOR (esquerda) ─── */
.editor-panel{
  background:var(--bg-panel);
  border-right:1px solid var(--border);
  padding:24px 20px;
  overflow-y:auto;
  display:flex;flex-direction:column;gap:18px;
}

.form-card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:10px;overflow:hidden;
  box-shadow:var(--shadow-xs);
}
.form-card__head{
  display:flex;align-items:center;gap:8px;
  padding:9px 14px;
  border-bottom:1px solid var(--border);
  background:var(--bg-panel);
}
.card-icon{font-size:13px;line-height:1;}
.card-title{
  font-family:'DM Mono',monospace;
  font-size:9.5px;font-weight:600;
  letter-spacing:0.13em;text-transform:uppercase;color:var(--text-muted);
}
.card-body{padding:14px;display:flex;flex-direction:column;gap:11px;}

.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.fld{display:flex;flex-direction:column;gap:5px;}
.fld.s2{grid-column:span 2;}

label{
  font-size:9px;font-weight:600;letter-spacing:0.09em;
  text-transform:uppercase;color:var(--text-muted);
  font-family:'DM Mono',monospace;
}
input,select{
  width:100%;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:400;
  color:var(--text);background:var(--bg-input);
  border:1px solid var(--border-md);border-radius:7px;
  padding:9px 11px;outline:none;
  transition:border-color 0.16s,box-shadow 0.16s;
  appearance:none;-webkit-appearance:none;
}
input::placeholder{color:var(--text-muted);}
input:focus,select:focus{
  border-color:var(--border-focus);
  box-shadow:0 0 0 3px rgba(26,168,168,0.12);
  background:#fff;
}
.sel-wrap{position:relative;}
.sel-wrap::after{
  content:'▾';position:absolute;right:10px;top:50%;transform:translateY(-50%);
  font-size:10px;color:var(--text-muted);pointer-events:none;
}
.sel-wrap select{padding-right:28px;cursor:pointer;}

.promo-toggle{
  display:flex;align-items:center;gap:10px;
  background:var(--bg-input);border:1px solid var(--border-md);border-radius:7px;
  padding:10px 13px;cursor:pointer;
  transition:background 0.15s,border-color 0.15s;
}
.promo-toggle:has(input:checked){
  background:#FFF5F8;border-color:rgba(200,49,94,0.30);
}
.promo-toggle input[type="checkbox"]{
  width:16px;height:16px;padding:0;border-radius:4px;
  flex-shrink:0;accent-color:var(--magenta);cursor:pointer;
}
.promo-toggle-label{font-size:12.5px;font-weight:500;color:var(--text-sub);user-select:none;flex:1;}
.promo-badge-pill{
  font-size:9px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;
  color:var(--magenta);background:rgba(200,49,94,0.08);
  border:1px solid rgba(200,49,94,0.22);border-radius:20px;padding:2px 8px;
  font-family:'DM Mono',monospace;
}
#fpo-wrap{display:none;}

.form-actions{display:flex;flex-direction:column;gap:8px;padding-top:4px;}
.btn{
  width:100%;display:flex;align-items:center;justify-content:center;gap:8px;
  padding:11px 18px;border:none;border-radius:8px;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  letter-spacing:0.02em;
  transition:transform 0.12s,box-shadow 0.14s,opacity 0.13s;
}
.btn:active{transform:scale(0.975);}
.btn-add{background:var(--teal);color:#fff;box-shadow:0 2px 10px rgba(26,168,168,0.28);}
.btn-add:hover{box-shadow:0 4px 16px rgba(26,168,168,0.38);opacity:0.93;}
.btn-update{background:#fff;border:1px solid var(--border-md);color:var(--text-sub);box-shadow:var(--shadow-xs);}
.btn-update:hover{border-color:var(--border-focus);color:var(--text);}
.btn-print{background:var(--magenta);color:#fff;box-shadow:0 2px 10px rgba(200,49,94,0.22);}
.btn-print:hover{box-shadow:0 4px 16px rgba(200,49,94,0.32);opacity:0.93;}

/* ─── PREVIEW (direita) ─── */
.preview-panel{background:var(--bg);overflow-y:auto;}

.pv-head{
  position:sticky;top:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 28px;
  background:rgba(242,237,231,0.92);backdrop-filter:blur(6px);
  border-bottom:1px solid var(--border);
}
.pv-title{
  font-family:'DM Mono',monospace;
  font-size:10px;font-weight:600;letter-spacing:0.13em;
  text-transform:uppercase;color:var(--text-muted);
}
.pv-count{
  display:flex;align-items:center;gap:6px;
  font-family:'DM Mono',monospace;font-size:11px;
  color:var(--teal);background:var(--teal-lt);
  border:1px solid rgba(26,168,168,0.22);border-radius:20px;
  padding:3px 12px;
}
.pv-count b{font-weight:600;}

.pv-body{padding:28px 28px 48px;}

/* ════════════════════════════════════════
   TAGS GRID — 2 colunas na tela
   (impressão usa buildPrintHTML() separado)
════════════════════════════════════════ */
.tags-grid{
  display:grid;
  grid-template-columns:repeat(2, max-content);
  gap:24px 20px;
}

.tw{
  display:flex;flex-direction:column;gap:6px;
  animation:slideIn 0.2s ease forwards;
}
@keyframes slideIn{
  from{opacity:0;transform:translateY(6px);}
  to{opacity:1;transform:translateY(0);}
}

/* linha interna: [índice] [tag] */
.tw-row{display:flex;align-items:center;gap:10px;}

.tidx{
  font-family:'DM Mono',monospace;font-size:10px;font-weight:500;
  color:var(--text-muted);width:18px;text-align:right;flex-shrink:0;
}

.delbtn{
  align-self:flex-end;
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;
  color:var(--magenta);background:#fff;
  border:1px solid rgba(200,49,94,0.25);border-radius:6px;
  padding:4px 11px;cursor:pointer;
  box-shadow:var(--shadow-xs);
  transition:background 0.13s,border-color 0.13s;
}
.delbtn:hover{background:#FFF5F8;border-color:rgba(200,49,94,0.5);}

/* ════════════════════════════════════════
   ETIQUETA — preservada para impressão
════════════════════════════════════════ */
.tag{
  width:var(--tag-w);height:var(--tag-h);
  display:flex;border-radius:6px;overflow:hidden;
  flex-shrink:0;position:relative;
  background:#fdf3ea;border:1px solid #c8c8c8;
  box-shadow:var(--shadow-tag);
}
.tag::after{
  content:'';position:absolute;right:-5px;top:50%;transform:translateY(-50%);
  width:11px;height:11px;border-radius:50%;
  background:var(--bg);border:1.5px solid #bbb;z-index:20;
}
.tag-side{display:none;}
.tag-side img{display:none;}
.tag-stripe{
  position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,#1AA8A8 0%,#F5821F 50%,#E03A7A 100%);
  z-index:5;
}
.tag-body{
  flex:1;display:flex;flex-direction:column;
  padding:12px 12px 9px 12px;overflow:hidden;position:relative;
}
.tag-top,.tag-foot{position:relative;z-index:1;}
.tag-top{display:flex;flex-direction:column;gap:4px;max-height:52px;overflow:hidden;}
.tag-name{
  font-family:'Montserrat',Arial,sans-serif;
  font-size:13px;font-weight:800;color:#111;line-height:1.25;
  white-space:normal;letter-spacing:-0.01em;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;position:relative;top:-2px;
}
.pills{display:flex;gap:4px;align-items:center;flex-wrap:wrap;position:relative;top:-2px;}
.pill{
  font-size:7px;font-weight:700;padding:2px 7px;border-radius:20px;
  letter-spacing:0.04em;line-height:1.4;
  font-family:'Montserrat',Arial,sans-serif;text-transform:uppercase;
}
.p-cat{background:#F5821F;color:#fff;}
.p-occ{border:1.5px solid #E03A7A;color:#E03A7A;background:transparent;}
.p-promo{background:#E74C3C;color:#fff;}
.price-orig-row{
  position:absolute;top:-7px;right:0;
  display:flex;align-items:baseline;gap:2px;
  background:rgba(253,243,234,0.60);padding:0px 3px;border-radius:3px;z-index:3;line-height:1.3;
}
.tag-price-col{position:relative;}
.price-orig-label{font-family:'Montserrat',sans-serif;font-size:7px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:0.04em;}
.price-orig{font-family:'Montserrat',sans-serif;font-size:10.5px;font-weight:700;color:#aaa;text-decoration:line-through;letter-spacing:0.01em;}
.p-label-promo{color:#E74C3C !important;}
.tag-foot{
  position:absolute;top:66px;left:12px;right:12px;bottom:9px;
  display:flex;align-items:flex-end;justify-content:flex-start;
  gap:10px;border-top:1px dashed #e0e0e0;padding-top:4px;overflow:visible;
}
.tag-codes-col{display:flex;flex-direction:column;gap:1px;flex:0 0 131px;width:131px;}
.tag-sku-wrap{display:flex;align-items:center;gap:4px;}
.sku-dot{width:6px;height:6px;border-radius:50%;background:#1AA8A8;flex-shrink:0;}
.tag-sku{font-size:9px;color:#444;font-family:'Courier New',monospace;font-weight:700;letter-spacing:0.05em;}
.tag-ean{font-size:8px;color:#777;font-family:'Courier New',monospace;font-weight:600;padding-left:10px;letter-spacing:0.03em;}
.barcode-wrap{display:flex;flex-direction:column;align-items:flex-start;gap:0;width:131px;}
.barcode-wrap canvas{display:block;width:131px !important;height:29px;}
.barcode-num{font-size:6px;color:#666;font-family:'Courier New',monospace;font-weight:600;letter-spacing:0.10em;margin-top:0;padding-left:1px;line-height:1.1;}
.tag-price-col{text-align:left;flex-shrink:0;padding-right:2px;display:flex;flex-direction:column;align-items:center;margin-left:auto;}
.price-tag-line{display:flex;align-items:baseline;justify-content:flex-start;gap:2px;line-height:1;}
.p-cur{font-family:'Montserrat',Arial,sans-serif;font-size:14px;font-weight:900;color:var(--dark);vertical-align:baseline;margin-right:1px;}
.p-int{font-family:'Montserrat',Arial,sans-serif;font-weight:900;color:var(--dark);line-height:1;letter-spacing:0.04em;}
.p-cts{font-family:'Montserrat',Arial,sans-serif;font-size:18px;font-weight:900;color:var(--dark);align-self:flex-start;margin-top:6px;letter-spacing:0.04em;}
.p-label{font-size:6.5px;color:#777;font-weight:700;text-align:center;letter-spacing:0.04em;text-transform:uppercase;margin-top:0;font-family:'Montserrat',sans-serif;width:100%;line-height:1.2;white-space:nowrap;}

/* ════════════════════════════════════════
   IMPRESSÃO DIRETA (Ctrl+P na página)
   — a impressão via botão usa buildPrintHTML()
     que gera HTML próprio, independente disto
════════════════════════════════════════ */
@media print{
  body{background:#fff;padding:0.5cm;}
  .app-header,.editor-panel,.pv-head,.tidx,.delbtn{display:none !important;}
  .app-layout{display:block;}
  .preview-panel,.pv-body{padding:0;}
  /* volta para coluna única no Ctrl+P direto */
  .tags-grid{
    display:flex;flex-direction:column;gap:0.4cm;
  }
  .tw{flex-direction:row;gap:0;}
  .tw-row{gap:0;}
  .tag{box-shadow:none;}
  .tag::after{background:#fff;}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
</style>
</head>

// === CATEGORY COLOR MAP ===
const CAT_COLORS = {
  'Aromaterapia':     '#8E44AD',  // lilás
  'Beleza':           '#F06292',  // rosa
  'Bem-Estar':        '#1AA8A8',  // teal
  'Casa & Jardim':    '#196F3D',  // verde-musgo
  'Cozinha':          '#E67E22',  // laranja-terracota
  'Decoração':        '#9B59B6',  // violeta
  'Diversos Pessoal': '#7F8C8D',  // cinza (igual ao antigo Personalizado)
  'Geek':             '#2C3E7A',  // azul-índigo
  'Gourmet':          '#922B21',  // vinho
  'Infantil':         '#F0A500',  // âmbar
  'Luminárias':       '#D4891A',  // dourado-quente
  'Moda & Acessórios':'#E03A7A',  // magenta
  'Papelaria':        '#2980B9',  // azul-médio
  'Porta Retratos':   '#8B5E3C',  // marrom-café
};
function getCatColor(cat) { return CAT_COLORS[cat] || '#F5821F'; }

function togglePromo(cb) {
  document.getElementById('fpo-wrap').style.display = cb.checked ? 'flex' : 'none';
  document.getElementById('lbprice').textContent = cb.checked
    ? 'Preço Por (promocional)' : 'Preço unitário (ex: 64,50 · 129 · 1.164,90)';
}

function priceSize(int) {
  const len = int.replace(/\./g,'').length;
  if (len <= 2) return { fs: '44px', ls: '1px',  cfs: '16px', curfs: '13px' };
  if (len === 3) return { fs: '38px', ls: '1px',  cfs: '14px', curfs: '12px' };
  if (len === 4) return { fs: '33px', ls: '0.5px',cfs: '13px', curfs: '11px' };
  return                { fs: '26px', ls: '0px',  cfs: '11px', curfs: '10px'  };
}

function parseP(raw) {
  const c = raw.trim().replace(/\s/g,'');
  if (c.includes(',')) {
    const idx = c.lastIndexOf(',');
    return { int: c.substring(0, idx), cts: c.substring(idx) };
  }
  return { int: c, cts: '' };
}

function buildTag(d, idx, total) {
  const {int, cts} = parseP(d.price);
  const isPromo = !!d.promo;
  const sz = priceSize(int);
  const hasOcc = d.occ && d.occ.trim()!=='';
  const hasEan = d.ean && d.ean.trim()!=='';
  const hasOrig = isPromo && d.priceOrig && d.priceOrig.trim()!=='';
  const catColor = getCatColor(d.cat);

  const wrap = document.createElement('div');
  wrap.className = 'tw';
  wrap.dataset.tag = JSON.stringify(d);

  const ix = document.createElement('div');
  ix.className = 'tidx';
  ix.textContent = idx+1;

  const tag = document.createElement('div');
  tag.className = 'tag';

  const promoOrigHTML = hasOrig
    ? `<div class="price-orig-row">
         <span class="price-orig-label">de</span>
         <span class="price-orig">R$${d.priceOrig}</span>
       </div>`
    : '';

  const promoLabelText = isPromo ? 'preço promocional' : 'preço unitário';
  const promoLabelClass = isPromo ? 'p-label p-label-promo' : 'p-label';

  const promoPill = isPromo
    ? `<span class="pill p-promo">promo</span>`
    : '';

  tag.innerHTML = `
    <div class="tag-side">
      <img src="data:image/png;base64,${LOGO}" alt="Mimos e Presentes">
    </div>
    <div class="tag-stripe"></div>
    <div class="tag-body">
      <div class="tag-top">
        <div class="tag-name">${d.name}</div>
        <div class="pills">
          <span class="pill p-cat" style="background:${catColor}">${d.cat}</span>
          ${hasOcc ? `<span class="pill p-occ" style="${d.occ.includes('Black Friday')?'border-color:#111;color:#111;':''}"> ${d.occ}</span>` : ''}
          ${promoPill}
        </div>
      </div>
      <div class="tag-foot">
        <div class="tag-codes-col">
          <div class="tag-sku-wrap">
            <div class="tag-sku">${d.sku}</div>
          </div>
          ${hasEan ? `<div class='barcode-wrap'><canvas id='bc-${idx}' class='bc-print' data-ean='${d.ean}'></canvas><div class='barcode-num'>${d.ean}</div></div>` : ''}
        </div>
        <div class="tag-price-col">
          ${promoOrigHTML}
          <div class="price-tag-line">
            <span class="p-cur" style="font-size:${sz.curfs}">R$</span>
            <span class="p-int" style="font-size:${sz.fs};letter-spacing:${sz.ls}">${int}</span>
            ${cts ? `<span class="p-cts" style="font-size:${sz.cfs}">${cts}</span>` : ''}
          </div>
          <div class="${promoLabelClass}">${promoLabelText}</div>
        </div>
      </div>
    </div>`;

  const del = document.createElement('button');
  del.className = 'delbtn';
  del.textContent = '✕ remover';
  del.style.display = total > 1 ? 'block' : 'none';
  del.onclick = () => { wrap.remove(); upCount(); upDel(); };

  const row=document.createElement('div');row.className='tw-row';row.appendChild(ix);row.appendChild(tag);wrap.appendChild(row);wrap.appendChild(del);
  return wrap;
}

function tagHTML(d) {
  const {int, cts} = parseP(d.price);
  const isPromo = !!d.promo;
  const sz = priceSize(int);
  const hasOcc = d.occ && d.occ.trim()!=='';
  const hasEan = d.ean && d.ean.trim()!=='';
  const hasOrig = isPromo && d.priceOrig && d.priceOrig.trim()!=='';
  const catColor = getCatColor(d.cat);

function buildPrintHTML() {
  var ws = document.querySelectorAll('.tw');
  if (!ws.length) { alert('Nenhuma etiqueta na lista.'); return null; }
  var tags = [];
  for (var i = 0; i < ws.length; i++) {
    try { tags.push(JSON.parse(ws[i].dataset.tag)); }
    catch(e) { alert('Erro ao ler etiqueta #' + (i+1) + ': ' + e.message); return null; }
  }
  var css = '';
  try { css = a4CSS(); }
  catch(e) { alert('Erro ao gerar CSS: ' + e.message); return null; }
  var body = '';
  for (var j = 0; j < tags.length; j++) {
    try { body += tagHTML(tags[j]); }
    catch(e) { alert('Erro ao gerar etiqueta #' + (j+1) + ': ' + e.message); return null; }
  }
  return '<!DOCTYPE html><html><head><meta charset="UTF-8">' + css + '</head><body><div class="grid">' + body + '</div></body></html>';
}

function printViaIframe(html) {
  // Tentativa 1: Blob URL (Chrome/Edge/Firefox modernos)
  try {
    var blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    var url  = URL.createObjectURL(blob);
    var win  = window.open(url, '_blank');
    if (win) {
      win.onload = function() {
        setTimeout(function() { win.focus(); win.print(); }, 500);
        setTimeout(function() { URL.revokeObjectURL(url); }, 5000);
      };
      // Fallback se onload não disparar (alguns navegadores)
      setTimeout(function() {
        try { win.focus(); win.print(); } catch(e){}
        setTimeout(function() { URL.revokeObjectURL(url); }, 3000);
      }, 1500);
      return;
    }
    URL.revokeObjectURL(url);
  } catch(e) {}
  // Tentativa 2: window.open + document.write
  try {
    var w2 = window.open('', '_blank');
    if (w2) {
      w2.document.open();
      w2.document.write(html);
      w2.document.close();
      setTimeout(function() { w2.focus(); w2.print(); }, 800);
      return;
    }
  } catch(e2) {}
  // Tentativa 3: download do arquivo HTML para impressão manual
  try {
    var b3   = new Blob([html], { type: 'text/html;charset=utf-8' });
    var u3   = URL.createObjectURL(b3);
    var a    = document.createElement('a');
    a.href   = u3; a.download = 'etiquetas_mimos.html';
    a.click();
    setTimeout(function() { URL.revokeObjectURL(u3); }, 3000);
    alert('Pop-ups bloqueados. O arquivo foi baixado — abra-o no navegador e use Ctrl+P para imprimir.');
  } catch(e3) {
    alert('Não foi possível imprimir. Tente salvar a página e abri-la diretamente no Chrome.');
  }
}

function printList() {
  var html = buildPrintHTML();
  if (html) printViaIframe(html);
}

function printA4Grid() {
  var html = buildPrintHTML();
  if (html) printViaIframe(html);

function drawBarcode(canvasId, eanStr){
  const cv=document.getElementById(canvasId);
  if(!cv||!eanStr) return;
  const w=131, h=29;
  const bits=C128.encode(eanStr);
  const dpr=window.devicePixelRatio||1;
  cv.width=Math.round(w*dpr); cv.height=Math.round(h*dpr);
  cv.style.width=w+'px'; cv.style.height=h+'px';
  const ctx=cv.getContext('2d');
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,w,h);
  // snap para pixel grid: cada barra ocupa posição inteira → sem anti-aliasing
  const barW=w/bits.length;
  let x=0;
  for(let i=0;i<bits.length;i++){
    const nextX=Math.round((i+1)*barW);
    if(bits[i]==='1'){ ctx.fillStyle='#000'; ctx.fillRect(Math.round(i*barW),0,nextX-Math.round(i*barW),h); }
    x=nextX;
  }
}
